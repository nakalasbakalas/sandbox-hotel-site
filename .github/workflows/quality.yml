name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: ESLint
        run: npx eslint src/ public/assets/js/ public/admin/app.js --max-warnings 0

  test:
    name: Worker Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run Worker tests
        run: npm run test:worker

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Security audit (high+critical only)
        run: npm audit --audit-level=high

  seo-check:
    name: SEO / Meta Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate meta basics
        run: |
          node -e "
          const fs = require('fs');
          const html = fs.readFileSync('public/index.html', 'utf8');
          const errors = [];

          // charset must be in first 1024 bytes
          const first1kb = html.slice(0, 1024);
          if (!first1kb.includes('<meta charset')) errors.push('FAIL: <meta charset> not in first 1024 bytes');
          if (!first1kb.includes('<meta name=\"viewport\"')) errors.push('FAIL: <meta name=viewport> not in first 1024 bytes');

          // canonical
          if (!html.includes('rel=\"canonical\"')) errors.push('FAIL: no canonical link');

          // unique title
          const titleMatch = html.match(/<title[^>]*>([^<]+)<\/title>/);
          if (!titleMatch) errors.push('FAIL: no <title> tag found');

          // meta description
          if (!html.includes('name=\"description\"')) errors.push('FAIL: no meta description');

          // JSON-LD BreadcrumbList should have distinct item URLs
          const bcMatch = html.match(/\"@type\":\s*\"BreadcrumbList\"[\s\S]*?\"itemListElement\":\s*\[([\s\S]*?)\]/);
          if (bcMatch) {
            const itemUrls = [...bcMatch[1].matchAll(/\"item\":\s*\"([^\"]+)\"/g)].map(m => m[1]);
            if (new Set(itemUrls).size < itemUrls.length) errors.push('FAIL: BreadcrumbList items have duplicate URLs');
          }

          // hreflang consistency
          const htmlHreflang = [...html.matchAll(/hreflang=\"([^\"]+)\"/g)].map(m => m[1]);
          const sitemap = fs.readFileSync('public/sitemap.xml', 'utf8');
          const sitemapHreflang = [...sitemap.matchAll(/hreflang=\"([^\"]+)\"/g)].map(m => m[1]);
          const htmlSet = new Set(htmlHreflang);
          const sitemapSet = new Set(sitemapHreflang);
          for (const tag of sitemapSet) {
            if (!htmlSet.has(tag)) errors.push('FAIL: sitemap hreflang ' + tag + ' not found in index.html');
          }

          if (errors.length) {
            errors.forEach(e => console.error(e));
            process.exit(1);
          }
          console.log('SEO checks passed.');
          "

  performance:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  accessibility:
    name: Axe Accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run axe static HTML check
        run: node scripts/axe-check.js
