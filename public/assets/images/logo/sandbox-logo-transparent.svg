<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sandbox Hotel logo</title>
  <desc id="desc">A dark rounded square plaque with a gold border, a stylized window and horizon mark, and the words Sandbox Hotel.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="100" x2="660" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4b4134"/>
      <stop offset=".45" stop-color="#2d261f"/>
      <stop offset="1" stop-color="#17120e"/>
    </linearGradient>
    <linearGradient id="gold" x1="126" y1="80" x2="674" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7e391"/>
      <stop offset=".2" stop-color="#d3a846"/>
      <stop offset=".5" stop-color="#ffefad"/>
      <stop offset=".78" stop-color="#b67d1f"/>
      <stop offset="1" stop-color="#f0d172"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="196" y1="170" x2="604" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe9a0"/>
      <stop offset=".55" stop-color="#d7ac51"/>
      <stop offset="1" stop-color="#f0d57b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#000000" flood-opacity=".35"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="76" y="48" width="648" height="704" rx="88" fill="#0d0906"/>
    <rect x="86" y="58" width="628" height="684" rx="80" fill="url(#bg)" stroke="url(#gold)" stroke-width="14"/>
    <rect x="102" y="74" width="596" height="652" rx="68" fill="none" stroke="url(#goldSoft)" stroke-width="4"/>
  </g>

  <g fill="none" stroke="url(#goldSoft)" stroke-linecap="round" stroke-linejoin="round" filter="url(#textShadow)">
    <rect x="258" y="184" width="284" height="250" stroke-width="16"/>
    <path d="M258 334H347C377 334 413 344 452 369C484 389 508 398 542 398" stroke-width="13"/>
    <path d="M258 427C311 386 354 361 393 352C435 343 483 353 542 385" stroke-width="15"/>
    <path d="M258 434H542" stroke-width="11"/>
  </g>

  <g fill="url(#gold)" text-anchor="middle" filter="url(#textShadow)">
    <text x="400" y="575" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" letter-spacing="8">SANDBOX</text>
    <text x="400" y="655" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" letter-spacing="12">HOTEL</text>
  </g>
</svg>
