<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <title>Offer Strip Builder — Internal</title>
  <meta name="description" content="Internal booking offer strip builder.">
  <style>
    :root{
      --bg:#f7f5f2;
      --panel:#ffffff;
      --panel-2:#faf8f5;
      --text:#2d2921;
      --muted:#7a6e5f;
      --accent:#A8652A;
      --accent-2:#C4884E;
      --border:rgba(168,101,42,.18);
      --shadow:0 24px 60px rgba(0,0,0,.08);
      --radius:18px;
      --paper:#ffffff;
      --ink:#161616;
      --paper-border:#d7d1c7;
      --stripe-height:51mm;
      --stripe-gap:4mm;
      --page-padding:10mm;
      --ui-font:"Manrope",Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:var(--ui-font);
      color:var(--text);
      background:var(--bg);
    }
    button,input,textarea,select{font:inherit}
    a{text-decoration:none;color:inherit}

    /* ── Builder shell ─────────────────────────────────────── */

    .shell{
      max-width:1440px;
      margin:0 auto;
      padding:24px;
      display:grid;
      grid-template-columns:360px minmax(0,1fr);
      gap:20px;
      min-height:100vh;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .controls .head,
    .stage .head{
      padding:18px 20px;
      border-bottom:1px solid var(--border);
      background:linear-gradient(180deg,rgba(168,101,42,.04),rgba(168,101,42,0));
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:11px;
      line-height:1;
      text-transform:uppercase;
      letter-spacing:.14em;
      padding:8px 10px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#fff;
      font-weight:800;
    }

    h1,h2,p{margin:0}
    h1{font-size:28px;line-height:1.05;margin-top:10px;color:var(--text)}
    .sub{margin-top:8px;color:var(--muted);line-height:1.45;font-size:14px}

    .form{padding:18px 20px;display:grid;gap:14px}
    .group{display:grid;gap:8px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label{font-size:13px;font-weight:700;color:var(--muted);display:grid;gap:6px}
    input,textarea,select{
      width:100%;
      border:1px solid var(--border);
      background:var(--panel-2);
      color:var(--text);
      border-radius:12px;
      padding:11px 12px;
      min-height:44px;
    }
    input:focus,textarea:focus,select:focus{
      outline:none;
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(168,101,42,.15);
    }
    textarea{min-height:72px;resize:vertical}
    .hint{font-size:12px;color:var(--muted);line-height:1.45}

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:0 20px 20px;
    }
    .btn{
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
      min-height:46px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      transition:transform .15s ease,border-color .15s ease,background .15s ease;
    }
    .btn:hover{transform:translateY(-1px);border-color:var(--accent)}
    .btn.primary{
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#fff;
      border-color:transparent;
    }
    .btn.full{grid-column:1/-1}

    .stageBody{padding:20px}
    .paperWrap{
      display:flex;
      justify-content:center;
      overflow:auto;
      padding:10px;
      background:
        linear-gradient(180deg,rgba(168,101,42,.03),rgba(168,101,42,0)),
        rgba(0,0,0,.02);
      border-top:1px solid var(--border);
    }

    .footerNote{
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
    }

    /* ── Image controls ────────────────────────────────────── */

    .imageGroup{display:grid;gap:8px}
    .imageGroup .imageToggle{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .imageGroup .imageToggle input[type="checkbox"]{
      width:18px;height:18px;
      accent-color:var(--accent);
      min-height:auto;
      cursor:pointer;
    }
    .imageGroup .imageToggle span{
      font-size:13px;font-weight:700;color:var(--muted);
    }
    .imageGrid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:6px;
    }
    .imageGrid button{
      border:2px solid transparent;
      border-radius:8px;
      padding:0;
      cursor:pointer;
      overflow:hidden;
      background:none;
      aspect-ratio:4/3;
      transition:border-color .15s ease,box-shadow .15s ease;
    }
    .imageGrid button:hover{border-color:var(--accent-2)}
    .imageGrid button.selected{
      border-color:var(--accent);
      box-shadow:0 0 0 2px rgba(168,101,42,.25);
    }
    .imageGrid button img{
      width:100%;height:100%;object-fit:cover;display:block;
    }

    .uploadRow{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .uploadBtn{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      font-weight:700;
      color:var(--accent);
      background:rgba(168,101,42,.06);
      border:1px solid rgba(168,101,42,.22);
      border-radius:8px;
      padding:7px 12px;
      cursor:pointer;
      transition:background .15s ease;
    }
    .uploadBtn:hover{background:rgba(168,101,42,.12)}
    .uploadBtn svg{width:14px;height:14px;fill:currentColor}
    .uploadName{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:140px;
    }
    .removeUpload{
      font-size:11px;
      color:#a55;
      background:none;
      border:none;
      cursor:pointer;
      padding:2px 6px;
      border-radius:4px;
      font-weight:700;
    }
    .removeUpload:hover{background:rgba(170,85,85,.08)}

    .sep{
      border:none;
      border-top:1px solid var(--border);
      margin:4px 0;
    }

    /* ── A4 page ───────────────────────────────────────────── */

    .page{
      width:210mm;
      min-height:297mm;
      background:var(--paper);
      color:var(--ink);
      padding:var(--page-padding);
      box-shadow:0 18px 60px rgba(0,0,0,.10);
      display:grid;
      grid-template-rows:repeat(5,var(--stripe-height));
      gap:var(--stripe-gap);
    }

    /* ── Offer strip ───────────────────────────────────────── */

    .strip{
      position:relative;
      display:grid;
      grid-template-columns:minmax(0,1.3fr) minmax(0,1.6fr) 52mm;
      align-items:stretch;
      border:1px solid #d1c8bb;
      border-radius:10px;
      overflow:hidden;
      background:#faf8f4;
      -webkit-print-color-adjust:exact;
      print-color-adjust:exact;
    }

    /* ── Left: brand panel ─────────────────────────────────── */

    .brand{
      position:relative;
      overflow:hidden;
      display:grid;
      align-content:end;
      padding:12px 14px;
      background:
        linear-gradient(160deg,#f5ede2 0%,#ede0cf 100%);
    }

    .brand .brandImage{
      position:absolute;
      inset:0;
      z-index:0;
    }
    .brand .brandImage img{
      width:100%;height:100%;object-fit:cover;display:block;
    }
    .brand .brandImage::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,
        rgba(250,246,240,.2) 0%,
        rgba(237,224,207,.55) 35%,
        rgba(220,197,168,.78) 100%
      );
    }

    .brand.no-image .brandImage{display:none}

    .brandInner{
      position:relative;
      z-index:1;
      display:grid;
      gap:6px;
    }

    .brandName{
      font-size:20px;
      font-weight:950;
      line-height:1;
      letter-spacing:.05em;
      text-transform:uppercase;
      color:#2a1e10;
      text-shadow:0 0 12px rgba(255,255,255,.5);
    }

    .brandContact{
      display:flex;
      align-items:center;
      gap:6px;
    }

    .brandPhone{
      font-size:12px;
      font-weight:800;
      color:#3a2c1c;
      letter-spacing:.03em;
      line-height:1;
      white-space:nowrap;
    }

    .brandQr{
      width:32px;
      height:32px;
      border-radius:3px;
      overflow:hidden;
      flex-shrink:0;
      background:#fff;
    }
    .brandQr img{
      width:100%;height:100%;object-fit:contain;display:block;
    }
    .brandQr.hidden{display:none}

    /* ── Middle: offer details ─────────────────────────────── */

    .offer{
      padding:10px 16px;
      display:grid;
      align-content:center;
      gap:4px;
      border-left:1px solid #d1c8bb;
      border-right:1px solid #d1c8bb;
      background:linear-gradient(180deg,#fffdfb 0%,#f9f5ef 100%);
    }

    .offerHeadline{
      font-size:21px;
      line-height:1;
      font-weight:950;
      letter-spacing:-.02em;
      color:#1a1a1a;
      text-transform:uppercase;
    }

    .offerBody{
      font-size:10.5px;
      line-height:1.3;
      color:#4a4038;
      font-weight:600;
    }

    .offerMeta{
      display:flex;
      flex-wrap:wrap;
      gap:5px;
      margin-top:3px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      min-height:20px;
      padding:3px 8px;
      border-radius:4px;
      font-size:8.5px;
      line-height:1;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.1em;
      background:#efe8dd;
      color:#54473b;
      border:1px solid #ddd3c5;
    }

    .offerTerms{
      font-size:8px;
      line-height:1.3;
      color:#7a7068;
      margin-top:1px;
    }

    /* ── Right: action panel ───────────────────────────────── */

    .action{
      padding:10px 12px;
      display:grid;
      align-content:center;
      justify-items:center;
      gap:7px;
      background:linear-gradient(180deg,#faf5ed 0%,#f0e3d2 100%);
    }

    .codeLabel{
      font-size:7.5px;
      line-height:1;
      text-transform:uppercase;
      letter-spacing:.2em;
      color:#7a6650;
      font-weight:800;
    }

    .code{
      width:100%;
      text-align:center;
      font-size:17px;
      line-height:1;
      font-weight:950;
      letter-spacing:.1em;
      border:1.5px solid rgba(168,101,42,.35);
      border-radius:6px;
      padding:10px 6px;
      color:#7a4518;
      background:rgba(255,255,255,.8);
      text-transform:uppercase;
    }

    .cta{
      width:100%;
      text-align:center;
      font-size:10.5px;
      line-height:1;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.1em;
      color:#fff;
      border-radius:6px;
      padding:10px 8px;
      background:linear-gradient(135deg,#A8652A,#C4884E);
    }

    .actionUrl{
      text-align:center;
      font-size:7.5px;
      line-height:1.2;
      color:#7a6e5f;
      word-break:break-word;
    }

    /* ── Builder responsive ────────────────────────────────── */

    @media (max-width:1100px){
      .shell{grid-template-columns:1fr}
    }

    @media (max-width:720px){
      .shell{padding:14px;gap:14px}
      .grid2,.actions{grid-template-columns:1fr}
      .paperWrap{padding:0;background:none;border-top:none}
      .page{transform-origin:top center;transform:scale(.58);margin:-60px auto -60px}
    }

    /* ── Print ─────────────────────────────────────────────── */

    @page{
      size:A4 portrait;
      margin:0;
    }

    @media print{
      body{background:#fff}
      .controls,.stage .head,.footerNote{display:none !important}
      .shell{display:block;max-width:none;margin:0;padding:0}
      .stage{border:none;box-shadow:none;background:none}
      .stageBody{padding:0}
      .paperWrap{padding:0;background:none;border:none}
      .page{box-shadow:none;margin:0;width:210mm;min-height:297mm}
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="shell">
    <aside class="controls panel">
      <div class="head">
        <span class="eyebrow">สร้างคูปอง</span>
        <h1>แถบข้อเสนอ A4</h1>
        <p class="sub">ห้าแถบข้อเสนอต่อหน้า A4 แก้ไข ดูตัวอย่าง แล้วพิมพ์หรือบันทึกเป็น PDF</p>
      </div>

      <div class="form">
        <div class="group">
          <label>ชื่อโรงแรม
            <input id="hotelName" type="text" value="Sandbox Hotel">
          </label>
          <label>เบอร์โทรศัพท์
            <input id="phone" type="text" value="066 111 7070">
          </label>
        </div>

        <div class="group">
          <div class="uploadRow">
            <label class="uploadBtn" for="qrInput">
              <svg viewBox="0 0 16 16"><path d="M0 2a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2zm1 0v4a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1zm2 1v2h2V3H3zM0 10a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-4zm1 0v4a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1zm2 1v2h2v-2H3zM8 2a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V2zm1 0v4a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1zm2 1v2h2V3h-2z"/></svg>
              อัปโหลด LINE QR
            </label>
            <input type="file" id="qrInput" accept="image/*" style="display:none">
            <span class="uploadName" id="qrName"></span>
            <button class="removeUpload" id="removeQr" type="button" style="display:none">ลบ</button>
          </div>
        </div>

        <div class="group">
          <label>หัวข้อหลัก
            <input id="headline" type="text" value="ลด 10% เมื่อจองตรง">
          </label>
          <label>ข้อความสนับสนุน
            <textarea id="subline">จองตรงกับแซนด์บ็อกซ์ โฮเทล รับราคาดีที่สุด ยืนยันรวดเร็ว พร้อมบริการส่วนตัว</textarea>
          </label>
        </div>

        <div class="grid2">
          <label>รหัสโปรโมชั่น
            <input id="code" type="text" value="SANDBOX10">
          </label>
          <label>ข้อความปุ่ม CTA
            <input id="cta" type="text" value="จองตรง">
          </label>
        </div>

        <div class="grid2">
          <label>จองภายใน
            <input id="validity" type="text" value="จองภายใน 30 เม.ย. 2026">
          </label>
          <label>เข้าพักถึง
            <input id="stay" type="text" value="เข้าพักถึง 31 พ.ค. 2026">
          </label>
        </div>

        <div class="group">
          <label>เงื่อนไข
            <textarea id="terms">เฉพาะการจองตรงเท่านั้น ขึ้นอยู่กับห้องว่าง ใช้ได้ 1 สิทธิ์ต่อการเข้าพัก ไม่สามารถใช้ร่วมกับโปรโมชั่นอื่นได้</textarea>
          </label>
        </div>

        <div class="group">
          <label>เว็บไซต์
            <input id="url" type="text" value="www.sandboxhotel.com">
          </label>
        </div>

        <hr class="sep">

        <div class="imageGroup">
          <div class="imageToggle">
            <input type="checkbox" id="showImage" checked>
            <span>แสดงรูปภาพในแผงแบรนด์</span>
          </div>
          <div class="imageGrid" id="imageGrid"></div>
          <div class="uploadRow">
            <label class="uploadBtn" for="uploadInput">
              <svg viewBox="0 0 16 16"><path d="M8 1a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 1z"/></svg>
              อัปโหลดรูปภาพ
            </label>
            <input type="file" id="uploadInput" accept="image/*" style="display:none">
            <span class="uploadName" id="uploadName"></span>
            <button class="removeUpload" id="removeUpload" type="button" style="display:none">ลบ</button>
          </div>
        </div>

        <p class="hint">5 แถบต่อ A4 หนึ่งแผ่น ควรใช้หัวข้อสั้นกระชับเพื่อผลลัพธ์การพิมพ์ที่ดีที่สุด</p>
      </div>

      <div class="actions">
        <button class="btn primary" id="printBtn" type="button">พิมพ์ / บันทึก PDF</button>
        <button class="btn" id="resetBtn" type="button">รีเซ็ต</button>
        <button class="btn full" id="saveBtn" type="button">บันทึกค่าปัจจุบันในอุปกรณ์นี้</button>
      </div>
    </aside>

    <section class="stage panel">
      <div class="head">
        <span class="eyebrow">ตัวอย่าง</span>
        <h2>แผ่นพิมพ์ 5 แถบ</h2>
      </div>
      <div class="stageBody">
        <div class="paperWrap">
          <div class="page" id="page"></div>
        </div>
        <p class="footerNote">ขนาดสำหรับแถบข้อเสนอ 5 แถบแนวนอนบนกระดาษ A4 แนวตั้งหนึ่งแผ่น</p>
      </div>
    </section>
  </div>

  <template id="stripTemplate">
    <article class="strip">
      <div class="brand no-image">
        <div class="brandImage">
          <img src="" alt="">
        </div>
        <div class="brandInner">
          <div class="brandName js-hotel"></div>
          <div class="brandContact">
            <div class="brandPhone js-phone"></div>
            <div class="brandQr hidden js-qr"><img src="" alt="LINE QR"></div>
          </div>
        </div>
      </div>
      <div class="offer">
        <div class="offerHeadline js-headline"></div>
        <div class="offerBody js-subline"></div>
        <div class="offerMeta">
          <span class="chip js-validity"></span>
          <span class="chip js-stay"></span>
        </div>
        <div class="offerTerms js-terms"></div>
      </div>
      <div class="action">
        <div class="codeLabel">รหัสส่วนลด</div>
        <div class="code js-code"></div>
        <div class="cta js-cta"></div>
        <div class="actionUrl js-url"></div>
      </div>
    </article>
  </template>

  <script>
    const STORAGE_KEY = 'sandbox_coupon_strip_a4_v1';

    /* Gallery images sourced from the site's existing asset directories */
    const GALLERY_IMAGES = [
      { src: '/images/Sandbox-Hotel-Hero-Banner-720.webp', label: 'Hero Banner' },
      { src: '/assets/images/gallery/entrance-400.webp', label: 'Entrance' },
      { src: '/assets/images/gallery/lobby-400.webp', label: 'Lobby' },
      { src: '/assets/images/gallery/evening-view-400.webp', label: 'Evening View' },
      { src: '/assets/images/gallery/flower-view-400.webp', label: 'Flower View' },
      { src: '/assets/images/gallery/staircase-400.webp', label: 'Staircase' },
      { src: '/assets/images/rooms/double-room-sandboxhotel-1-400.webp', label: 'Double Room 1' },
      { src: '/assets/images/rooms/double-room-sandboxhotel-2-400.webp', label: 'Double Room 2' },
      { src: '/assets/images/rooms/twin-room-sandbox-1-400.webp', label: 'Twin Room 1' },
      { src: '/assets/images/rooms/twin-room-sandbox-2-400.webp', label: 'Twin Room 2' },
      { src: '/assets/images/rooms/bathroom-400.webp', label: 'Bathroom' },
    ];

    const defaults = {
      hotelName: 'Sandbox Hotel',
      phone: '066 111 7070',
      headline: 'ลด 10% เมื่อจองตรง',
      subline: 'จองตรงกับแซนด์บ็อกซ์ โฮเทล รับราคาดีที่สุด ยืนยันรวดเร็ว พร้อมบริการส่วนตัว',
      code: 'SANDBOX10',
      cta: 'จองตรง',
      validity: 'จองภายใน 30 เม.ย. 2026',
      stay: 'เข้าพักถึง 31 พ.ค. 2026',
      terms: 'เฉพาะการจองตรงเท่านั้น ขึ้นอยู่กับห้องว่าง ใช้ได้ 1 สิทธิ์ต่อการเข้าพัก ไม่สามารถใช้ร่วมกับโปรโมชั่นอื่นได้',
      url: 'www.sandboxhotel.com',
      showImage: true,
      selectedImage: 0,
      uploadedImage: null
    };

    const ids = ['hotelName','phone','headline','subline','code','cta','validity','stay','terms','url'];
    const page = document.getElementById('page');
    const template = document.getElementById('stripTemplate');
    const showImageCheckbox = document.getElementById('showImage');
    const imageGrid = document.getElementById('imageGrid');
    const uploadInput = document.getElementById('uploadInput');
    const uploadNameEl = document.getElementById('uploadName');
    const removeUploadBtn = document.getElementById('removeUpload');
    const qrInput = document.getElementById('qrInput');
    const qrNameEl = document.getElementById('qrName');
    const removeQrBtn = document.getElementById('removeQr');

    let selectedImageIndex = defaults.selectedImage;
    let uploadedDataUrl = null;
    let useUploadedImage = false;
    let qrDataUrl = null;

    /* Build image picker grid */
    GALLERY_IMAGES.forEach((img, i) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.title = img.label;
      btn.innerHTML = '<img src="'+img.src+'" alt="'+img.label+'" loading="lazy">';
      btn.addEventListener('click', () => {
        selectedImageIndex = i;
        useUploadedImage = false;
        updateImageSelection();
        render();
      });
      imageGrid.appendChild(btn);
    });

    /* Upload handling */
    uploadInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        uploadedDataUrl = ev.target.result;
        useUploadedImage = true;
        uploadNameEl.textContent = file.name;
        removeUploadBtn.style.display = '';
        updateImageSelection();
        render();
      };
      reader.readAsDataURL(file);
    });

    removeUploadBtn.addEventListener('click', () => {
      uploadedDataUrl = null;
      useUploadedImage = false;
      uploadInput.value = '';
      uploadNameEl.textContent = '';
      removeUploadBtn.style.display = 'none';
      updateImageSelection();
      render();
    });

    /* QR code upload handling */
    qrInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        qrDataUrl = ev.target.result;
        qrNameEl.textContent = file.name;
        removeQrBtn.style.display = '';
        render();
      };
      reader.readAsDataURL(file);
    });

    removeQrBtn.addEventListener('click', () => {
      qrDataUrl = null;
      qrInput.value = '';
      qrNameEl.textContent = '';
      removeQrBtn.style.display = 'none';
      render();
    });

    function updateImageSelection(){
      const btns = imageGrid.querySelectorAll('button');
      btns.forEach((b, i) => b.classList.toggle('selected', !useUploadedImage && i === selectedImageIndex));
    }

    function getImageSrc(){
      if(useUploadedImage && uploadedDataUrl) return uploadedDataUrl;
      const img = GALLERY_IMAGES[selectedImageIndex];
      return img ? img.src : null;
    }

    function getImageAlt(){
      if(useUploadedImage) return 'Custom upload';
      const img = GALLERY_IMAGES[selectedImageIndex];
      return img ? img.label : '';
    }

    function getValues(){
      const values = {};
      ids.forEach(id => values[id] = document.getElementById(id).value.trim());
      values.showImage = showImageCheckbox.checked;
      values.selectedImage = selectedImageIndex;
      values.useUploadedImage = useUploadedImage;
      return values;
    }

    function setValues(values){
      ids.forEach(id => {
        document.getElementById(id).value = values[id] ?? defaults[id];
      });
      showImageCheckbox.checked = values.showImage ?? defaults.showImage;
      selectedImageIndex = values.selectedImage ?? defaults.selectedImage;
      updateImageSelection();
    }

    function render(){
      const v = getValues();
      const imgSrc = getImageSrc();
      const imgAlt = getImageAlt();
      page.innerHTML = '';
      for(let i = 0; i < 5; i += 1){
        const node = template.content.firstElementChild.cloneNode(true);
        node.querySelector('.js-hotel').textContent = v.hotelName || 'Sandbox Hotel';
        node.querySelector('.js-phone').textContent = v.phone || '';
        node.querySelector('.js-headline').textContent = v.headline || 'ลด 10% เมื่อจองตรง';
        node.querySelector('.js-subline').textContent = v.subline || '';
        node.querySelector('.js-validity').textContent = v.validity || 'จำกัดเวลา';
        node.querySelector('.js-stay').textContent = v.stay || 'ตามเงื่อนไข';
        node.querySelector('.js-terms').textContent = v.terms || '';
        node.querySelector('.js-code').textContent = (v.code || 'OFFER').toUpperCase();
        node.querySelector('.js-cta').textContent = v.cta || 'จองตรง';
        node.querySelector('.js-url').textContent = v.url || '';

        /* Image handling */
        const brandPanel = node.querySelector('.brand');
        if(v.showImage && imgSrc){
          brandPanel.classList.remove('no-image');
          const img = brandPanel.querySelector('.brandImage img');
          img.src = imgSrc;
          img.alt = imgAlt;
        } else {
          brandPanel.classList.add('no-image');
        }

        /* QR code handling */
        const qrEl = node.querySelector('.js-qr');
        if(qrDataUrl){
          qrEl.classList.remove('hidden');
          qrEl.querySelector('img').src = qrDataUrl;
        } else {
          qrEl.classList.add('hidden');
        }

        page.appendChild(node);
      }
    }

    function save(){
      const v = getValues();
      /* Do not persist the full data URL to localStorage — too large.
         Instead persist a flag so user knows they had an upload active. */
      v.uploadedImage = null;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(v));
    }

    function load(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return defaults;
        return {...defaults, ...JSON.parse(raw)};
      }catch{
        return defaults;
      }
    }

    function reset(){
      localStorage.removeItem(STORAGE_KEY);
      uploadedDataUrl = null;
      useUploadedImage = false;
      uploadInput.value = '';
      uploadNameEl.textContent = '';
      removeUploadBtn.style.display = 'none';
      qrDataUrl = null;
      qrInput.value = '';
      qrNameEl.textContent = '';
      removeQrBtn.style.display = 'none';
      setValues(defaults);
      render();
    }

    ids.forEach(id => {
      document.getElementById(id).addEventListener('input', render);
    });
    showImageCheckbox.addEventListener('change', render);

    document.getElementById('saveBtn').addEventListener('click', () => {
      save();
      const btn = document.getElementById('saveBtn');
      const original = btn.textContent;
      btn.textContent = 'บันทึกแล้ว';
      setTimeout(() => btn.textContent = original, 1200);
    });

    document.getElementById('resetBtn').addEventListener('click', reset);
    document.getElementById('printBtn').addEventListener('click', () => window.print());

    setValues(load());
    updateImageSelection();
    render();
  </script>
</body>
</html>
